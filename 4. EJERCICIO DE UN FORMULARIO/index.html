<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de registro</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="contenedor">
    <h2>Formulario de registro</h2>

    <form>

        <div class="fila">
            <div class="campo">
                <label>Nombre</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Apellidos</label>
                <input type="text">
            </div>
        </div>

        <div class="fila">
            <label>Calle, n&uacute;mero, piso, puerta</label>
            <input type="text">
        </div>

        <div class="fila">
            <div class="campo">
                <label>C&oacute;digo postal</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Municipio</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Provincia</label>
                <input type="text">
            </div>
        </div>

        <div class="fila">
            <label>País</label>
            <input type="text">
        </div>

        <div class="fila">
            <div class="campo">
                <label>Email</label>
                <input type="email">
            </div>

            <div class="campo">
                <label>Teléfono</label>
                <input type="tel">
            </div>
        </div>

        <div class="fila genero">
            <label>Género</label><br>
            <input type="radio" name="genero"> Hombre
            <input type="radio" name="genero"> Mujer
            <input type="radio" name="genero"> Otro
        </div>

        <div class="fila condiciones">
            <input type="checkbox"> Acepto las condiciones
        </div>

        <div class="fila boton">
            <button type="submit">Registrarse</button>
        </div>

    </form>
</div>

</body>
</html>
